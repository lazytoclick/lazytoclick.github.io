<p>不好意思，這個頁面<br>可能是因為網址更新而無法順利呈現<br>我們將於 <span id="timeout">3</span> 秒後，導向首頁</p>
<p>您也可以自行點選 <a href="https://lazytoclick.github.io/">傳送門(↗)</a><br>返回首頁<br>省下讀秒的時間</p>
<script>
let countTime = 3;

function count() {
  
  document.getElementById('timeout').textContent = countTime;
  countTime -= 1;
  if(countTime === 0){
    location.href = 'https://lazytoclick.github.io/';
  }
  setTimeout(() => {
    count();
  }, 1000);
}

count();
</script>
